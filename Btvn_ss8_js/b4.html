<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>b4</title>
</head>
<body>
    <script>
        const players = [
            "Messi - Forward - 25",
            "Ronaldo - Forward - 30",
            "Neymar - Forward - 18",
            "De Bruyne - Midfielder - 8",
            "Kante - Midfielder - 2",
            "Van Dijk - Defender - 5",
            "Alisson - Goalkeeper - 0",];
        function getReversedNames(players) {
            let copiedPlayers = players.slice();
            let reversedPlayers = copiedPlayers.reverse();
            let names = reversedPlayers.map(function (player) {
                let parts = player.split(" - ");
                return parts[0];
            });
            return names;
        }
        console.log(getReversedNames(players));
    </script>
</body>
</html>
