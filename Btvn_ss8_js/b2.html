<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>b2</title>
</head>
<body>
    <script>
        let players = [
            "Messi",
            "Ronaldo",
            "Neymar",
            "De Bruyne",
            "Kante",
            "Van Dijk",
            "Alisson"];
        function getUpperNames(playerNames) {
        let upperNames = playerNames.map(function(name) {
            return name.toUpperCase();
        });
        return upperNames;
        }
        let result = getUpperNames(players);
        console.log(result);
    </script>
</body>
</html>
